{% extends 'tasks/base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <div style="font-size: 4rem; margin-bottom: 1rem;">⚠️</div>
    <h2 style="margin-bottom: 1rem;">Delete Task?</h2>
    
    <p style="margin-bottom: 2rem; color: var(--text-muted);">
        Are you sure you want to delete the task <strong>"{{ task.title }}"</strong>? This action cannot be undone.
    </p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="gap-4" style="justify-content: center;">
            <a href="{% url 'task_detail' task.pk %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Delete It</button>
        </div>
    </form>
</div>
{% endblock %}
