{% extends 'tasks/base.html' %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 2rem;">{% if form.instance.pk %}Edit Task{% else %}Create New Task{% endif %}</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.title.id_for_label }}">Task Title</label>
            {{ form.title }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.description.id_for_label }}">Description</label>
            {{ form.description }}
        </div>
        
        <div class="form-group flex-between" style="justify-content: flex-start; gap: 1rem; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 0.75rem;">
            {{ form.completed }}
            <label for="{{ form.completed.id_for_label }}" style="margin: 0; cursor: pointer;">Mark as completed</label>
        </div>
        
        <div class="gap-4" style="margin-top: 2.5rem; display: flex; justify-content: flex-end;">
            <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn">Save Task</button>
        </div>
    </form>
</div>
{% endblock %}
